# ============================================================
# PID 位置控制节点 — 参数配置文件 (仿真 SITL v4)
# ============================================================
# 用法:
#   ros2 run offboard_control node_offboard_control \
#     --ros-args --params-file install/offboard_control/share/offboard_control/config/pid_params.yaml
# ============================================================

/**:
  ros__parameters:
    # --- PX4 版本兼容 (v4=SITL 1.18+) ---
    vehicle_status_suffix: "v4"

    # --- 控制模式: "velocity_pid" (机载PID) / "position" (PX4内部位置控制) ---
    control_mode: "velocity_pid"

    # --- PID 增益 — X 轴 ---
    pid.kp_x: 1.8
    pid.ki_x: 0.05
    pid.kd_x: 0.8

    # --- PID 增益 — Y 轴 ---
    pid.kp_y: 1.8
    pid.ki_y: 0.05
    pid.kd_y: 0.8

    # --- PID 增益 — Z 轴 ---
    pid.kp_z: 1.2
    pid.ki_z: 0.1
    pid.kd_z: 0.15

    # --- PID 增益 — 偏航 ---
    pid.kp_yaw: 1.0
    pid.ki_yaw: 0.03
    pid.kd_yaw: 0.05

    # --- 速度限制 ---
    pid.max_horizontal_speed: 4.0
    pid.max_vertical_speed: 3.0
    pid.max_yaw_rate: 1.0

    # --- 平滑滤波器 ---
    filter.lpf_cutoff_freq: 6.0
    filter.max_accel_horizontal: 5.0
    filter.max_accel_vertical: 4.0
    filter.max_accel_yaw: 1.5